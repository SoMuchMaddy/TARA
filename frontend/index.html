<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARA Frontend</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        background-color: #0f172a;
        color: #e5e7eb;
        padding: 20px;
    }

    h1, h2 {
        color: #f43f5e;
    }

    input {
        margin: 5px;
        padding: 8px;
        border-radius: 4px;
        border: none;
    }

    button {
        margin: 5px;
        padding: 8px 12px;
        border-radius: 4px;
        border: none;
        cursor: pointer;
        background-color: #1e293b;
        color: white;
    }

    button:hover {
        background-color: #334155;
    }

    ul {
        list-style: none;
        padding: 0;
    }

    li {
        margin: 8px 0;
        padding: 10px;
        background-color: #1e293b;
        border-radius: 6px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    li button {
        margin-left: 10px;
    }
</style>
</head>
<body>
    <h1>TARA - Cats</h1>

    <h2 id="formTitle">Add Cat</h2>
    <form id="catForm">
        <input type="text" id="nameInput" placeholder="Cat name" required>
        <input type="text" id="statusInput" placeholder="Status" required>
        <button type="submit" id="submitBtn">Add Cat</button>
    </form>

    <h2>Cat List</h2>
    <button id="loadCatsBtn">Load Cats</button>
    <ul id="catList"></ul>

    <script src="script.js"></script>
</body>
</html>
